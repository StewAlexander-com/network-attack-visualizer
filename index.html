<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117" id="metaThemeColor">
  <title>Network Attack Visualizer</title>
  <meta name="description" content="Interactive Layer 2/3 network attack visualization — ARP Spoofing, MAC Flooding, SYN Flood, DHCP Starvation, ICMP Redirect, Lateral Movement. Built with D3.js.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-faint: #484f58;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-red: #f85149;
      --accent-orange: #d29922;
      --accent-purple: #bc8cff;
      --font-ui: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Cascadia Code', monospace;
      --sidebar-width: 340px;
      --topbar-height: 52px;
      --footer-height: 36px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    [data-theme="light"] {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --surface-2: #f0f2f5;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --text-faint: #8b949e;
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      height: 100dvh; /* dynamic viewport height — handles mobile browser chrome */
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation; /* kill 300ms tap delay globally */
      padding-top: var(--safe-top);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ===== TOPBAR ===== */
    #topbar {
      height: var(--topbar-height);
      min-height: var(--topbar-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
      z-index: 100;
      overflow: hidden;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .logo svg { width: 24px; height: 24px; flex-shrink: 0; }
    .logo-text {
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .logo-text .accent { color: var(--accent-blue); }

    .divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* Attack Tabs — desktop */
    .attack-tabs {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      flex: 1;
      min-width: 0;
      scrollbar-width: none;
    }
    .attack-tabs::-webkit-scrollbar { display: none; }

    .attack-tab {
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 500;
      font-family: var(--font-ui);
      color: var(--text-muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .attack-tab:hover { color: var(--text); background: var(--surface-2); }
    .attack-tab.active {
      color: var(--text);
      background: var(--surface-2);
      border-color: var(--border);
    }

    /* Transport Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .ctrl-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .ctrl-btn:hover { color: var(--text); background: var(--surface-2); }
    .ctrl-btn:active { background: var(--surface-2); }
    .ctrl-btn.active { color: var(--accent-blue); border-color: var(--accent-blue); }

    .speed-group {
      display: flex;
      gap: 2px;
    }
    .speed-btn {
      padding: 4px 8px;
      font-size: 11px;
      font-family: var(--font-mono);
      font-weight: 500;
      color: var(--text-faint);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .speed-btn:hover { color: var(--text-muted); }
    .speed-btn.active {
      color: var(--accent-blue);
      background: rgba(88,166,255,0.08);
      border-color: rgba(88,166,255,0.3);
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-label input {
      accent-color: var(--accent-blue);
      cursor: pointer;
      width: 14px;
      height: 14px;
    }

    .theme-toggle {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-toggle:hover { color: var(--text); background: var(--surface-2); }

    /* Desktop-only controls in topbar */
    .desktop-only { display: flex; align-items: center; gap: 4px; }

    /* ===== MAIN LAYOUT ===== */
    #app {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    #canvas-container {
      flex: 1;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    #network-svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none; /* prevent browser gestures on the SVG canvas */
    }

    /* ===== SIDEBAR ===== */
    #detail-panel {
      width: var(--sidebar-width);
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #detail-panel::-webkit-scrollbar { width: 6px; }
    #detail-panel::-webkit-scrollbar-track { background: transparent; }
    #detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .panel-section {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }
    .panel-section:last-child { border-bottom: none; }

    .attack-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .mitre-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-family: var(--font-mono);
      font-weight: 500;
      color: var(--accent-red);
      background: rgba(248,81,73,0.08);
      border: 1px solid rgba(248,81,73,0.2);
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .mitre-badge:hover { background: rgba(248,81,73,0.15); }

    .phase-badge {
      display: inline-block;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent-orange);
      background: rgba(210,153,34,0.08);
      border: 1px solid rgba(210,153,34,0.2);
      border-radius: 4px;
      margin-top: 8px;
    }

    /* Attack Steps */
    .steps-list {
      list-style: none;
      counter-reset: step;
    }
    .step-item {
      counter-increment: step;
      position: relative;
      padding: 10px 12px 10px 36px;
      margin-bottom: 4px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-muted);
      border-left: 3px solid transparent;
      border-radius: 0 6px 6px 0;
      transition: all 0.25s ease;
    }
    .step-item::before {
      content: counter(step);
      position: absolute;
      left: 10px;
      top: 10px;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text-faint);
      background: var(--surface-2);
      border-radius: 50%;
      transition: all 0.25s ease;
    }
    .step-item.active {
      color: var(--text);
      background: rgba(248,81,73,0.06);
      border-left-color: var(--accent-red);
    }
    .step-item.active::before {
      color: #fff;
      background: var(--accent-red);
    }
    .step-item.completed { color: var(--text); }
    .step-item.completed::before {
      color: #fff;
      background: var(--accent-green);
    }

    /* Packet Table */
    .packet-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .packet-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 11px;
      table-layout: fixed;
    }
    .packet-table th {
      text-align: left;
      padding: 6px 5px;
      color: var(--text-faint);
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .packet-table colgroup .col-src { width: 22%; }
    .packet-table colgroup .col-dst { width: 22%; }
    .packet-table colgroup .col-proto { width: 14%; }
    .packet-table colgroup .col-info { width: 28%; }
    .packet-table colgroup .col-flag { width: 14%; }
    .packet-table td {
      padding: 4px 5px;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(48,54,61,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .packet-table tr { transition: opacity 0.2s ease; }
    .packet-table tr.new-row { animation: slideIn 0.3s ease; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .packet-table .flag-atk { color: var(--accent-red); font-weight: 500; }
    .packet-table .flag-norm { color: var(--accent-blue); }
    .packet-table .flag-warn { color: var(--accent-orange); font-weight: 500; }

    /* Callout boxes */
    .callout {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      display: flex;
      gap: 10px;
    }
    .callout-icon { flex-shrink: 0; width: 18px; height: 18px; margin-top: 1px; }
    .callout-detect {
      background: rgba(139,148,158,0.06);
      border: 1px solid rgba(139,148,158,0.15);
      color: var(--text-muted);
    }
    .callout-mitigate {
      background: rgba(63,185,80,0.06);
      border: 1px solid rgba(63,185,80,0.15);
      color: var(--accent-green);
    }
    .callout-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .callout-detect .callout-title { color: var(--text-faint); }
    .callout-mitigate .callout-title { color: var(--accent-green); }
    .callout-text { color: var(--text-muted); }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-faint);
      margin-bottom: 10px;
    }

    /* ===== FOOTER ===== */
    #statusbar {
      height: var(--footer-height);
      min-height: var(--footer-height);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      padding-bottom: var(--safe-bottom);
      font-size: 11px;
      color: var(--text-faint);
      flex-shrink: 0;
      gap: 8px;
      overflow: hidden;
    }
    .footer-left, .footer-right {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .footer-right {
      flex-shrink: 0;
    }
    .footer-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      font-size: 10px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 4px;
      white-space: nowrap;
    }
    .footer-link {
      color: var(--text-faint);
      text-decoration: none;
      transition: color 0.15s ease;
      display: flex;
      align-items: center;
    }
    .footer-link:hover { color: var(--accent-blue); }
    #statusText {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== SVG NETWORK GRAPH ===== */
    .node-group { cursor: pointer; }
    .node-shape {
      stroke-width: 1.5;
      transition: filter 0.3s ease;
    }
    .node-label {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      fill: var(--text);
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
    }
    .node-ip {
      font-family: var(--font-mono);
      font-size: 9px;
      fill: var(--text-faint);
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
    }
    .node-icon { pointer-events: none; user-select: none; }

    .link-line {
      stroke: var(--border);
      stroke-width: 1.5;
      stroke-opacity: 0.6;
    }

    .node-compromised .node-shape {
      filter: drop-shadow(0 0 12px var(--accent-red));
      animation: pulse-red 1.5s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(248,81,73,0.4)); }
      50% { filter: drop-shadow(0 0 16px rgba(248,81,73,0.8)); }
    }

    /* Node tooltip */
    .node-tooltip {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      min-width: 180px;
      max-width: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .node-tooltip.visible { opacity: 1; pointer-events: auto; }
    .node-tooltip .tt-label { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
    .node-tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 2px 0;
    }
    .node-tooltip .tt-key { color: var(--text-faint); font-size: 11px; }
    .node-tooltip .tt-val {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-all;
    }
    .node-tooltip .tt-status {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      font-weight: 500;
    }
    .tt-status.secure { color: var(--accent-green); }
    .tt-status.compromised { color: var(--accent-red); }

    /* Packets */
    .packet-dot { pointer-events: none; }
    .packet-label {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 500;
      pointer-events: none;
      user-select: none;
    }

    /* CAM table / routing overlay on nodes */
    .node-overlay {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--accent-orange);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent-orange);
      z-index: 150;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .node-overlay.visible { opacity: 1; }

    /* Progress bar overlay on nodes */
    .progress-overlay { pointer-events: none; }
    .progress-bg { fill: var(--surface-2); rx: 2; }
    .progress-fill { fill: var(--accent-red); rx: 2; transition: width 0.5s ease; }

    /* ===== MOBILE CONTROLS BOTTOM BAR ===== */
    .mobile-bottom-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0 12px;
      padding-bottom: var(--safe-bottom);
      z-index: 250;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .mobile-bottom-bar .ctrl-btn {
      width: 40px;
      height: 40px;
      min-width: 40px;
    }
    .mobile-bottom-bar .speed-group { display: flex; gap: 1px; }
    .mobile-bottom-bar .speed-btn {
      padding: 6px 8px;
      font-size: 12px;
      min-height: 36px;
    }
    .mobile-bottom-bar .mobile-info-btn {
      width: 40px;
      height: 40px;
      min-width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .mobile-bottom-bar .mobile-settings-btn {
      width: 40px;
      height: 40px;
      min-width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Drawer backdrop */
    .drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 190;
      opacity: 0;
      transition: opacity 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .drawer-backdrop.visible { opacity: 1; }

    /* Drawer handle */
    .drawer-handle {
      display: none;
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 8px auto 4px;
    }

    /* Mobile settings panel */
    .mobile-settings-drawer {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 8px 16px;
      padding-bottom: calc(64px + var(--safe-bottom));
      z-index: 260;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .mobile-settings-drawer.open { transform: translateY(0); }
    .mobile-settings-drawer .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text);
    }
    .mobile-settings-drawer .setting-row:last-child { border-bottom: none; }
    .mobile-settings-drawer .setting-label { color: var(--text-muted); font-size: 12px; }

    /* ===== MOBILE BREAKPOINT ===== */
    @media (max-width: 768px) {
      :root {
        --topbar-height: 48px;
        --footer-height: 0px; /* footer hidden on mobile */
      }

      .attack-tabs { display: none; }
      .desktop-only { display: none !important; }
      .divider { display: none; }

      #topbar {
        padding: 0 10px;
        gap: 6px;
      }
      .logo svg { width: 22px; height: 22px; }
      .logo-text { font-size: 13px; }

      /* Mobile: only show attack select + play/pause/reset + theme in topbar */
      .controls {
        gap: 3px;
      }

      #app { flex-direction: column; }

      #canvas-container {
        flex: 1;
        min-height: 0;
      }

      /* Footer hidden on mobile — controls move to bottom bar */
      #statusbar { display: none; }

      /* Mobile bottom control bar */
      .mobile-bottom-bar { display: flex; }

      /* Detail panel — bottom drawer */
      #detail-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        max-height: 65vh;
        border-left: none;
        border-top: 1px solid var(--border);
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 200;
        border-radius: 16px 16px 0 0;

      phase: 'Defense Evasion \u2192 Discovery',

    height = rect.height;

    // Add padding so nodes never clip edges
    const pad = isMobile() ? 30 : 40;

    nodes.forEach(n => {
      n.px = pad + n.x * (width - pad * 2);
      n.py = pad + n.y * (height - pad * 2);

    // Links
    linkGroup.selectAll('.link-line').remove();
    links.forEach(l => {
      const s = nodeMap[l.source], t = nodeMap[l.target];
      linkGroup.append('line')
        .attr('class', 'link-line')
        .attr('data-source', l.source)
        .attr('data-target', l.target)
        .attr('x1', s.px).attr('y1', s.py)
        .attr('x2', t.px).attr('y2', t.py);
    });

    // Nodes
    nodeGroup.selectAll('.node-group').remove();

    nodes.forEach(d => {
      const g = nodeGroup.append('g')
        .attr('class', 'node-group')
        .attr('data-id', d.id)
        .attr('transform', `translate(${d.px}, ${d.py})`);

      // Enlarge touch target on mobile
      if (isTouchDevice()) {
        g.append('circle')
          .attr('r', 30)
          .attr('fill', 'transparent')
          .attr('class', 'touch-target');
      }

      const shape = getNodeShape(d.type);
      if (shape.shape === 'circle') {
        g.append('circle')
          .attr('class', 'node-shape')
          .attr('r', shape.r)
          .attr('fill', shape.fill)
          .attr('stroke', shape.stroke);
      } else {
        g.append('rect')
          .attr('class', 'node-shape')
          .attr('width', shape.w)
          .attr('height', shape.h)
          .attr('x', -shape.w/2)
          .attr('y', -shape.h/2)
          .attr('rx', 6)
          .attr('fill', shape.fill)
          .attr('stroke', shape.stroke);
      }

      const iconSize = isMobile() ? '11px' : '14px';
      g.append('text')
        .attr('class', 'node-icon')
        .attr('text-anchor', 'middle')
        .attr('dy', '0.35em')
        .attr('font-size', iconSize)
        .attr('fill', shape.stroke)
        .text(getIconChar(d.type));

      const labelDy = d.type === 'switch' ? (isMobile() ? 22 : 28) :
        (shape.shape === 'circle' ? shape.r + (isMobile() ? 12 : 16) : shape.h/2 + (isMobile() ? 12 : 16));
      g.append('text')
        .attr('class', 'node-label')
        .attr('dy', labelDy)
        .text(d.label);

      if (d.ip) {
        const ipDy = d.type === 'switch' ? (isMobile() ? 32 : 40) :
          (shape.shape === 'circle' ? shape.r + (isMobile() ? 22 : 28) : shape.h/2 + (isMobile() ? 22 : 28));
        g.append('text')
          .attr('class', 'node-ip')
          .attr('dy', ipDy)
          .text(d.ip);
      }

      // Restore compromised state after re-render
      if (state.compromised.has(d.id)) {
        g.classed('node-compromised', true);
      }

      // Event handlers
      g.on('click', (event) => {
        event.stopPropagation();
        showNodeTooltip(event, d);
      });
    });
  }

  // ===== NODE TOOLTIP =====
  const tooltip = document.getElementById('nodeTooltip');
  let tooltipTimeout;

  function showNodeTooltip(event, d) {
    clearTimeout(tooltipTimeout);
    const isCompromised = state.compromised.has(d.id);
    tooltip.innerHTML = `
      <div class="tt-label">${d.label}</div>
      <div class="tt-row"><span class="tt-key">Type</span><span class="tt-val">${d.type}</span></div>
      ${d.ip ? `<div class="tt-row"><span class="tt-key">IP</span><span class="tt-val">${d.ip}</span></div>` : ''}
      ${d.mac ? `<div class="tt-row"><span class="tt-key">MAC</span><span class="tt-val">${d.mac}</span></div>` : ''}
      <div class="tt-row"><span class="tt-key">Role</span><span class="tt-val">${getRoleName(d.type)}</span></div>
      <div class="tt-status ${isCompromised ? 'compromised' : 'secure'}">${isCompromised ? '\u26A0 Compromised' : '\u2713 Secure'}</div>
    `;

    const rect = container.getBoundingClientRect();
    const ttW = 200, ttH = 150;
    let left = d.px + 30;
    let top = d.py - 20;

    // Clamp to viewport
    if (left + ttW > rect.width) left = Math.max(10, d.px - ttW - 10);
    if (top + ttH > rect.height) top = rect.height - ttH - 10;
    if (top < 0) top = 10;
    if (left < 0) left = 10;

    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
    tooltip.classList.add('visible');

    // Auto-dismiss on mobile after 4s
    if (isTouchDevice()) {
      tooltipTimeout = setTimeout(hideNodeTooltip, 4000);
    }
  }

  function hideNodeTooltip() {
    clearTimeout(tooltipTimeout);
    tooltip.classList.remove('visible');
  }

  function getRoleName(type) {
    const map = { cloud:'External Network', router:'L3 Gateway/Routing', switch:'L2 Switching', server:'Application Host', workstation:'End User Device', attacker:'Threat Actor' };
    return map[type] || type;
  }

  // ===== NODE OVERLAY =====
  const overlayEl = document.getElementById('nodeOverlay');

  function showNodeOverlay(nodeId, text) {
    const n = nodeMap[nodeId];
    if (!n) return;
    overlayEl.innerHTML = text;
    const rect = container.getBoundingClientRect();
    let left = n.px + 30;
    let top = n.py - 40;
    // Clamp to viewport
    if (left + 220 > rect.width) left = Math.max(10, n.px - 220);
    if (top < 10) top = 10;
    if (left < 10) left = 10;
    overlayEl.style.left = left + 'px';
    overlayEl.style.top = top + 'px';
    overlayEl.classList.add('visible');

  // ===== PACKET ANIMATION ENGINE =====
  function animatePacket(sourceId, targetId, spec, label, onComplete) {
    if (!state.visible) { if (onComplete) onComplete(); return; }
    const s = nodeMap[sourceId];
    const t = nodeMap[targetId];
    if (!s || !t) { if (onComplete) onComplete(); return; }

    const duration = spec.speed / state.speed;
    const r = isMobile() ? Math.max(2, spec.r - 1) : spec.r;

    const g = packetGroup.append('g').attr('class', 'packet-dot');

    g.append('circle')
      .attr('r', r)
      .attr('fill', spec.color)
      .attr('opacity', spec.opacity)
      .attr('filter', spec.opacity > 0.7 ? 'url(#glow)' : null);

    if (label && !isMobile()) {
      g.append('text')
        .attr('class', 'packet-label')
        .attr('dy', -r - 4)
        .attr('text-anchor', 'middle')
        .attr('fill', spec.color)
        .text(label);
    }

    g.attr('transform', `translate(${s.px}, ${s.py})`);

    g.transition()
      .duration(duration)
      .ease(d3.easeLinear)
      .attr('transform', `translate(${t.px}, ${t.py})`)
      .on('end', () => {
        g.remove();
        if (onComplete) safeExec(onComplete, 'packet-callback');
      });

    state.packetAnimations.push(g);
    return g;
  }

  function animatePacketBurst(sourceId, targetId, spec, count, label, stagger) {
    stagger = (stagger || 50) / state.speed;
    for (let i = 0; i < count; i++) {
      const timer = setTimeout(() => {
        if (!state.playing || !state.visible) return;
        animatePacket(sourceId, targetId, spec, i === 0 ? label : null);
      }, i * stagger);
      state.animationTimers.push(timer);
    }
  }

  // ===== BASELINE TRAFFIC =====
  function startBaselineTraffic() {
    if (state.baselineInterval) return;
    const routes = [
      ['ws-a','switch'], ['switch','router'], ['router','gateway'], ['gateway','internet'],
      ['ws-b','switch'], ['switch','server-a'],
    ];
    state.baselineInterval = setInterval(() => {
      if (!state.playing || !state.visible) return;
      const route = routes[Math.floor(Math.random() * routes.length)];
      animatePacket(route[0], route[1], PACKET.normal);
    }, 2500 / state.speed);
  }

  function stopBaselineTraffic() {
    if (state.baselineInterval) {
      clearInterval(state.baselineInterval);
      state.baselineInterval = null;
    }
  }

  // ===== COMPROMISE STATE =====
  function setCompromised(nodeId, compromised) {
    const g = nodeGroup.select(`[data-id="${nodeId}"]`);
    if (g.empty()) return;
    if (compromised) {
      state.compromised.add(nodeId);
      g.classed('node-compromised', true);
    } else {
      state.compromised.delete(nodeId);
      g.classed('node-compromised', false);
    }
  }

  // ===== PACKET TABLE =====
  const packetTableBody = document.getElementById('packetTableBody');
  let packetRows = [];

  function addPacketRow(src, dst, proto, info, flag) {
    const flagClass = flag === 'ATK' ? 'flag-atk' : flag === 'WARN' ? 'flag-warn' : 'flag-norm';
    packetRows.unshift({ src, dst, proto, info, flag, flagClass });
    if (packetRows.length > 5) packetRows = packetRows.slice(0, 5);
    renderPacketTable();

    packetTableBody.innerHTML = packetRows.map((r, i) =>
      `<tr class="${i === 0 ? 'new-row' : ''}">
        <td title="${r.src}">${r.src}</td><td title="${r.dst}">${r.dst}</td><td>${r.proto}</td><td title="${r.info}">${r.info}</td>
        <td class="${r.flagClass}">${r.flag}</td>
      </tr>`
    ).join('');
  }

  function clearPacketTable() {
    packetRows = [];
    packetTableBody.innerHTML = '';

    document.querySelectorAll('.step-item').forEach((el, i) => {

  // ===== ATTACK ANIMATIONS =====
  function scheduleStep(delay, fn) {
    const timer = setTimeout(() => {
      if (state.playing && state.visible) safeExec(fn, 'scheduled-step');
    }, delay / state.speed);
    state.animationTimers.push(timer);
    return timer;
  }

  const playFunctions = [playARPSpoof, playMACFlood, playSYNFlood, playDHCPStarve, playICMPRedirect, playLateralMove];

  // ===== TRANSPORT CONTROLS =====
  function play() {
    if (state.playing) return;
    state.playing = true;
    updateControlState();
    if (state.baselineTraffic) startBaselineTraffic();
    safeExec(() => playFunctions[state.currentAttack](), 'play-attack');
  }

  function pauseInternal() {
    state.playing = false;
    stopBaselineTraffic();
  }

  function pause() {
    pauseInternal();
    updateControlState();
  }

  function reset() {
    state.playing = false;
    state.step = -1;
    state.animationTimers.forEach(t => clearTimeout(t));
    state.animationTimers = [];
    state.packetAnimations.forEach(g => { try { g.remove(); } catch(e) {} });
    state.packetAnimations = [];
    stopBaselineTraffic();
    packetGroup.selectAll('*').remove();
    overlayGroup.selectAll('*').remove();
    state.compromised.forEach(id => setCompromised(id, false));
    state.compromised.clear();
    hideNodeOverlay();
    hideNodeTooltip();
    clearPacketTable();
    document.querySelectorAll('.step-item').forEach(el => el.classList.remove('active', 'completed'));
    updateControlState();
    setStatus('Ready');
  }

  function selectAttack(idx) {
    reset();
    state.currentAttack = idx;
    renderPanel(idx);
    document.querySelectorAll('.attack-tab').forEach((tab, i) => tab.classList.toggle('active', i === idx));
    document.getElementById('mobileAttackSelect').value = idx;
  }

  function setSpeed(speed) {
    state.speed = speed;
    // Update all speed button groups
    document.querySelectorAll('.speed-btn').forEach(btn => {
      btn.classList.toggle('active', parseFloat(btn.dataset.speed) === speed);
    });
  }

  function setBaselineTraffic(enabled) {
    state.baselineTraffic = enabled;
    document.getElementById('baselineToggle').checked = enabled;
    const mobileToggle = document.getElementById('mobileBaselineToggle');
    if (mobileToggle) mobileToggle.checked = enabled;
    if (state.playing && enabled) startBaselineTraffic();
    if (!enabled) stopBaselineTraffic();
  }

  function updateControlState() {
    document.getElementById('btnPlay').classList.toggle('active', state.playing);
    document.getElementById('btnPause').classList.toggle('active', !state.playing && state.step >= 0);
    const mp = document.getElementById('mBtnPlay');
    const mpa = document.getElementById('mBtnPause');
    if (mp) mp.classList.toggle('active', state.playing);
    if (mpa) mpa.classList.toggle('active', !state.playing && state.step >= 0);
  }

  function setStatus(text) {
    const el = document.getElementById('statusText');
    if (el) el.textContent = text;
  }

  function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    state.theme = next;
    // Update meta theme color for mobile browser chrome
    document.getElementById('metaThemeColor').content = next === 'dark' ? '#0d1117' : '#f6f8fa';
    // Update both theme icons
    ['themeIcon', 'mobileThemeIcon'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.setAttribute('data-lucide', next === 'dark' ? 'moon' : 'sun');
    });
    try { lucide.createIcons(); } catch(e) {}
  }

  // ===== DRAWER MANAGEMENT =====
  function openDrawer() {
    state.drawerOpen = true;
    document.getElementById('detail-panel').classList.add('open');
    document.getElementById('drawerBackdrop').style.display = 'block';
    requestAnimationFrame(() => document.getElementById('drawerBackdrop').classList.add('visible'));
  }

  function closeDrawer() {
    state.drawerOpen = false;
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('drawerBackdrop').classList.remove('visible');
    setTimeout(() => document.getElementById('drawerBackdrop').style.display = 'none', 300);
  }

  function openSettings() {
    state.settingsOpen = true;
    document.getElementById('mobileSettingsDrawer').style.display = 'block';
    document.getElementById('drawerBackdrop').style.display = 'block';
    requestAnimationFrame(() => {
      document.getElementById('mobileSettingsDrawer').classList.add('open');
      document.getElementById('drawerBackdrop').classList.add('visible');
    });
  }

  function closeSettings() {
    state.settingsOpen = false;
    document.getElementById('mobileSettingsDrawer').classList.remove('open');
    document.getElementById('drawerBackdrop').classList.remove('visible');
    setTimeout(() => {
      document.getElementById('mobileSettingsDrawer').style.display = 'none';
      document.getElementById('drawerBackdrop').style.display = 'none';
    }, 300);
  }

  // ===== WIRE CONTROLS =====
  function wireControls() {
    // Desktop transport
    document.getElementById('btnPlay').addEventListener('click', play);
    document.getElementById('btnPause').addEventListener('click', pause);
    document.getElementById('btnReset').addEventListener('click', reset);

    // Mobile transport
    document.getElementById('mBtnPlay').addEventListener('click', play);
    document.getElementById('mBtnPause').addEventListener('click', pause);
    document.getElementById('mBtnReset').addEventListener('click', reset);

    // All speed buttons (desktop + mobile)
    document.querySelectorAll('.speed-btn').forEach(btn => {
      btn.addEventListener('click', () => setSpeed(parseFloat(btn.dataset.speed)));
    });

    // Baseline toggles
    document.getElementById('baselineToggle').addEventListener('change', (e) => setBaselineTraffic(e.target.checked));
    const mbt = document.getElementById('mobileBaselineToggle');
    if (mbt) mbt.addEventListener('change', (e) => setBaselineTraffic(e.target.checked));

    // Theme toggles
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    const mtt = document.getElementById('mobileThemeToggle');
    if (mtt) mtt.addEventListener('click', toggleTheme);

    // Mobile drawer
    document.getElementById('mobileInfoBtn').addEventListener('click', () => {
      if (state.settingsOpen) closeSettings();
      if (state.drawerOpen) closeDrawer(); else openDrawer();
    });

    document.getElementById('mobileSettingsBtn').addEventListener('click', () => {
      if (state.drawerOpen) closeDrawer();
      if (state.settingsOpen) closeSettings(); else openSettings();
    });

    document.getElementById('drawerBackdrop').addEventListener('click', () => {
      if (state.drawerOpen) closeDrawer();
      if (state.settingsOpen) closeSettings();
    });

    // Mobile attack select
    document.getElementById('mobileAttackSelect').addEventListener('change', (e) => selectAttack(parseInt(e.target.value)));

    // Debounced resize
    window.addEventListener('resize', debounce(() => {
      renderGraph();
      // Close drawers on orientation change
      if (state.drawerOpen) closeDrawer();
      if (state.settingsOpen) closeSettings();
    }, 150));

    // Close tooltip on canvas tap
    document.getElementById('canvas-container').addEventListener('click', (e) => {
      if (!e.target.closest('.node-group')) hideNodeTooltip();
    });

    // Prevent pinch zoom on SVG (iOS Safari)
    document.getElementById('network-svg').addEventListener('gesturestart', (e) => e.preventDefault());
  }

  // ===== BUILD UI =====
  function buildTabs() {
    const tabsEl = document.getElementById('attackTabs');
    const selectEl = document.getElementById('mobileAttackSelect');
    attacks.forEach((atk, i) => {
      const tab = document.createElement('button');
      tab.className = 'attack-tab' + (i === 0 ? ' active' : '');
      tab.textContent = atk.short;
      tab.addEventListener('click', () => selectAttack(i));
      tabsEl.appendChild(tab);

      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = atk.name;
      selectEl.appendChild(opt);
    });
  }

  // ===== INIT =====
  function init() {
    safeExec(buildTabs, 'buildTabs');
    safeExec(wireControls, 'wireControls');
    safeExec(renderGraph, 'renderGraph');
    safeExec(() => renderPanel(0), 'renderPanel');
    try { lucide.createIcons(); } catch(e) {}
    setStatus('Ready \u2014 select an attack and press play');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
